name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Node dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml --features sandbox-sidecars

  platform-rust:
    name: Platform Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Rust on target OS
        run: cargo test --manifest-path src-tauri/Cargo.toml --features sandbox-sidecars

  windows-native-sandbox-smoke:
    name: Windows Native Sandbox Smoke
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify elevated runner
        shell: pwsh
        run: |
          $identity = [Security.Principal.WindowsIdentity]::GetCurrent()
          $principal = [Security.Principal.WindowsPrincipal]::new($identity)
          if (-not $principal.IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)) {
            throw "Windows native sandbox smoke test requires an elevated runner token."
          }
          Write-Host "Running elevated as $($identity.Name)."

      - name: Run native setup and runner smoke
        shell: pwsh
        env:
          NCB_RUN_WINDOWS_NATIVE_SMOKE: "1"
        run: |
          node scripts/prepare-tauri-sidecars.mjs --debug
          cargo test --manifest-path src-tauri/Cargo.toml --features sandbox-sidecars --test windows_native_smoke -- --nocapture
