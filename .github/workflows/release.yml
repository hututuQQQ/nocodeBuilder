name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and draft Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci

      - name: Verify tag matches package versions
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version

          if ($tagVersion -ne $packageVersion) {
            Write-Error "Tag version '$tagVersion' does not match package.json version '$packageVersion'."
            exit 1
          }

          if ($tagVersion -ne $tauriVersion) {
            Write-Error "Tag version '$tagVersion' does not match src-tauri/tauri.conf.json version '$tauriVersion'."
            exit 1
          }

      - name: Build and upload Windows bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: nocodeBuilder ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
